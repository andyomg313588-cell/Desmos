<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <title>Desmos 3D Möbius Strip - List Method</title>
    <script src="https://www.desmos.com/api/v1.12/calculator.js?apiKey=72c2649e438c488884a0dd1ec0578ac6"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #1a1a1a; }
        #calculator { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="calculator"></div>
    <script>
        var elt = document.getElementById('calculator');
        var calculator = Desmos.Calculator3D(elt);

        calculator.setExpressions([
            // 1. 仿照你的 s 寫法，直接定義 U 和 V 的列表範圍
            { id: 'u_list', latex: 'U=\\left[0, 0.05 ... 6.28\\right]' },
            { id: 'v_list', latex: 'V=\\left[-1, -0.5 ... 1\\right]' },
            
            // 2. 參數式算式，直接引用上面的大寫 U 和 V
            // 加上 +0U 和 +0V 是為了強迫 Desmos 對兩個列表做交集運算，畫出「面」
            {
                id: 'mobius',
                latex: '\\left((1+0.5V\\cos(0.5U))\\cos(U),(1+0.5V\\cos(0.5U))\\sin(U),0.5V\\sin(0.5U)\\right) + 0U + 0V',
                color: '#3895d3'
            }
        ]);

        calculator.setViewport([-3, 3, -3, 3, -2, 2]);
    </script>
</body>
</html>
