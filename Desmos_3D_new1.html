<!DOCTYPE html>

<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <title>Desmos 3D Möbius Strip - Rainbow Glow</title>
    <script src="https://www.desmos.com/api/v1.12/calculator.js?apiKey=72c2649e438c488884a0dd1ec0578ac6"></script>
    <style>
        body, html { 
            margin: 0; padding: 0; 
            width: 100%; height: 100%; 
            overflow: hidden; 
            background-color: #0b0f2a; /* 深色宇宙背景 */
        }
        #calculator { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="calculator"></div>

```
<script>
    var elt = document.getElementById('calculator');
    var calculator = Desmos.Calculator3D(elt, {
        expressions: true,
        settingsMenu: false
    });

    // 主體莫比烏斯帶（彩虹）
    calculator.setExpression({
        id: 'mobius_main',
        latex: '((1 + v\\cos(u/2))\\cos(u), (1 + v\\cos(u/2))\\sin(u), v\\sin(u/2))',
        colorLatex: '(\\sin(u)+1)/2',
        domain: {
            u: {min: '0', max: '2\\pi'},
            v: {min: '-0.35', max: '0.35'}
        }
    });

    // 外層光暈（淡白）
    calculator.setExpression({
        id: 'mobius_glow',
        latex: '((1 + v\\cos(u/2))\\cos(u), (1 + v\\cos(u/2))\\sin(u), v\\sin(u/2))',
        color: '#ffffff',
        opacity: 0.25,
        domain: {
            u: {min: '0', max: '2\\pi'},
            v: {min: '-0.5', max: '0.5'}
        }
    });

    // 中心亮線
    calculator.setExpression({
        id: 'mobius_core',
        latex: '((1 + v\\cos(u/2))\\cos(u), (1 + v\\cos(u/2))\\sin(u), v\\sin(u/2))',
        color: '#ffffaa',
        domain: {
            u: {min: '0', max: '2\\pi'},
            v: {min: '-0.05', max: '0.05'}
        }
    });

    // 中心發光點
    calculator.setExpression({
        id: 'center',
        latex: '(0,0,0)',
        color: '#ffffff',
        pointSize: 8
    });
</script>
