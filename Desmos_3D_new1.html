<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <title>Desmos 3D Möbius Strip - Real Surface</title>
    <script src="https://www.desmos.com/api/v1.12/calculator.js?apiKey=72c2649e438c488884a0dd1ec0578ac6"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #1a1a1a; }
        #calculator { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="calculator"></div>
    <script>
        var elt = document.getElementById('calculator');
        var calculator = Desmos.Calculator3D(elt);

        calculator.setExpressions([
            // 1. 定義基礎列表 s (0 到 1)
            { id: 's_list', latex: 's=\\left[0, 0.01 ... 1\\right]' },
            
            // 2. 使用列表推導式定義「面」
            // 這裡的關鍵在於使用 [ ... for a=..., b=... ] 語法
            // 它會強迫 u 依照 0.005 間距旋轉，同時 v 依照 0.1 間距鋪滿寬度
            {
                id: 'mobius_surface',
                latex: 'L=\\left[\\left((1+0.5v\\cos(0.5u))\\cos(u),(1+0.5v\\cos(0.5u))\\sin(u),0.5v\\sin(0.5u)\\right) \\text{ for } u=\\left[0,0.005...6.283\\right], v=\\left[-1,-0.8...1\\right]\\right]',
                color: '#3895d3'
            }
        ]);

        calculator.setViewport([-3, 3, -3, 3, -2, 2]);
    </script>
</body>
</html>
