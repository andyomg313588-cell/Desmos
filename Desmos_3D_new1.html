<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<title>Animated Möbius Strip</title>

<script src="https://www.desmos.com/api/v1.12/calculator.js?apiKey=72c2649e438c488884a0dd1ec0578ac6"></script>

<style>
body, html {
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#0b0f2a;
}

#calculator {
    width:100vw;
    height:100vh;
}
</style>
</head>

<body>

<div id="calculator"></div>

<script>

var elt = document.getElementById('calculator');

var calculator = Desmos.Calculator3D(elt,{
    expressions:true,
    settingsMenu:false
});


/* 時間變數 */

calculator.setExpression({
    id:"time",
    latex:"t=0"
});


/* 主 Möbius（彩虹） */

calculator.setExpression({

    id:'mobius_main',

    latex:
    '((1+v\\cos(u/2))\\cos(u+t),' +
    '(1+v\\cos(u/2))\\sin(u+t),' +
    'v\\sin(u/2))' +

    '\\{0\\le u\\le2\\pi\\}' +
    '\\{-0.35\\le v\\le0.35\\}',

    colorLatex:
    '(\\sin(u+t)+1)/2'

});


/* 外層光暈 */

calculator.setExpression({

    id:'mobius_glow',

    latex:
    '((1+v\\cos(u/2))\\cos(u+t),' +
    '(1+v\\cos(u/2))\\sin(u+t),' +
    'v\\sin(u/2))' +

    '\\{0\\le u\\le2\\pi\\}' +
    '\\{-0.5\\le v\\le0.5\\}',

    color:'#ffffff',

    opacity:0.2

});


/* 中心亮線 */

calculator.setExpression({

    id:'mobius_core',

    latex:
    '((1+v\\cos(u/2))\\cos(u+t),' +
    '(1+v\\cos(u/2))\\sin(u+t),' +
    'v\\sin(u/2))' +

    '\\{0\\le u\\le2\\pi\\}' +
    '\\{-0.05\\le v\\le0.05\\}',

    color:'#ffffaa'

});


/* 動畫 */

let t = 0;

setInterval(function(){

    t += 0.03;

    calculator.setExpression({
        id:"time",
        latex:"t=" + t
    });

},30);


</script>

</body>
</html>
