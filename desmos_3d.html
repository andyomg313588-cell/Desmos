<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <title>Desmos 3D 教學現場整合版</title>
    <script src="https://www.desmos.com/api/v1.12/calculator.js?apiKey=72c2649e438c488884a0dd1ec0578ac6"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #1a1a1a; }
        #calculator { width: 100vw; height: 100vh; }
    </style>
</head>
<body>

    <div id="calculator"></div>

    <script>
        var elt = document.getElementById('calculator');
        // 使用你測試成功的 Calculator3D 建構子
        var calculator = Desmos.Calculator3D(elt);

        calculator.setExpressions([
            // 1. 時間軸 (t 從 0 到 12)
            { id: 't', latex: 't=0', sliderBounds: { min: 0, max: 12, step: 0.1 }, playing: true },
            
            // 2. 黑板 (使用 polygon 函數)
            { id: 'board', latex: '\\operatorname{polygon}((0,-1.5,1),(0,1.5,1),(0,1.5,3),(0,-1.5,3))', color: '#16452d' },
            
            // 3. 人偶與肢體 (定義好 parametricDomain 就不會報錯)
            { id: 'head', latex: '(x-0.2)^2 + (y+1.2)^2 + (z-2.2)^2 = 0.05', color: '#ffffff' },
            { id: 'spine', latex: '(0.2, -1.2, 1 + 1.2s)', parametricDomain: { s: { min: 0, max: 1 } }, color: '#ffffff' },
            { id: 'legL', latex: '(0.2, -1.2 - 0.3s, s)', parametricDomain: { s: { min: 0, max: 1 } }, color: '#ffffff' },
            { id: 'legR', latex: '(0.2, -1.2 + 0.3s, s)', parametricDomain: { s: { min: 0, max: 1 } }, color: '#ffffff' },
            
            // 4. 動態棍子 (右手擺動)
            { id: 'stick', latex: '(0.1, -1.2 + 1.2s, 1.8 + 0.5s \\cdot \\sin(t))', parametricDomain: { s: { min: 0, max: 1.2 } }, color: '#ffcc00' },

            // 5. 動態寫字 (x + y = z)，時間未到則乘以 NaN 隱藏
            { id: 'x1', latex: '(0.05, -0.8 + 0.2s, 2.7 - 0.2s) \\cdot \\{t > 1 : 1, \\operatorname{NaN}\\}', parametricDomain: { s: { min: 0, max: 1 } }, color: '#ffffff' },
            { id: 'x2', latex: '(0.05, -0.8 + 0.2s, 2.5 + 0.2s) \\cdot \\{t > 2 : 1, \\operatorname{NaN}\\}', parametricDomain: { s: { min: 0, max: 1 } }, color: '#ffffff' },
            
            { id: 'p1', latex: '(0.05, -0.45 + 0.1s, 2.6) \\cdot \\{t > 3 : 1, \\operatorname{NaN}\\}', parametricDomain: { s: { min: 0, max: 1 } }, color: '#ffffff' },
            { id: 'p2', latex: '(0.05, -0.4, 2.55 + 0.1s) \\cdot \\{t > 4 : 1, \\operatorname{NaN}\\}', parametricDomain: { s: { min: 0, max: 1 } }, color: '#ffffff' },
            
            { id: 'y1', latex: '(0.05, -0.15 + 0.1s, 2.6 - 0.2s) \\cdot \\{t > 5 : 1, \\operatorname{NaN}\\}', parametricDomain: { s: { min: 0, max: 1 } }, color: '#ffffff' },
            { id: 'y2', latex: '(0.05, -0.05 - 0.1s, 2.6 - 0.1s) \\cdot \\{t > 6 : 1, \\operatorname{NaN}\\}', parametricDomain: { s: { min: 0, max: 1 } }, color: '#ffffff' },
            
            { id: 'e1', latex: '(0.05, 0.2 + 0.2s, 2.65) \\cdot \\{t > 7 : 1, \\operatorname{NaN}\\}', parametricDomain: { s: { min: 0, max: 1 } }, color: '#ffffff' },
            { id: 'e2', latex: '(0.05, 0.2 + 0.2s, 2.55) \\cdot \\{t > 8 : 1, \\operatorname{NaN}\\}', parametricDomain: { s: { min: 0, max: 1 } }, color: '#ffffff' },
            
            { id: 'z1', latex: '(0.05, 0.6 + 0.2s, 2.7) \\cdot \\{t > 9 : 1, \\operatorname{NaN}\\}', parametricDomain: { s: { min: 0, max: 1 } }, color: '#ffffff' },
            { id: 'z2', latex: '(0.05, 0.8 - 0.2s, 2.7 - 0.2s) \\cdot \\{t > 10 : 1, \\operatorname{NaN}\\}', parametricDomain: { s: { min: 0, max: 1 } }, color: '#ffffff' },
            { id: 'z3', latex: '(0.05, 0.6 + 0.2s, 2.5) \\cdot \\{t > 11 : 1, \\operatorname{NaN}\\}', parametricDomain: { s: { min: 0, max: 1 } }, color: '#ffffff' }
        ]);

        // 自動調整視角到適中位置
        calculator.setViewport([-4, 4, -4, 4, -1, 6]);
    </script>
</body>
</html>
