<script src="https://www.desmos.com/api/v1.11/calculator.js?apiKey=72c2649e438c488884a0dd1ec0578ac6"></script>

<div id="calculator" style="width: 100%; height: 500px; border: 1px solid #ccc;"></div>

<script>
    var elt = document.getElementById('calculator');
    // 初始化為 3D 模式
    var calculator = Desmos.Graphing3D(elt);

    // 額外功能：自動加入一個漂亮的 3D 方程式
    calculator.setExpression({ 
        id: 'graph1', 
        latex: 'z = \\sin(x) \\cdot \cos(y)',
        color: Desmos.Colors.BLUE 
    });
</script>
