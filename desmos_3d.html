<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <title>Desmos 3D 教學人偶 - 完美版</title>
    <script src="https://www.desmos.com/api/v1.12/calculator.js?apiKey=72c2649e438c488884a0dd1ec0578ac6"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #1a1a1a; }
        #calculator { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="calculator"></div>
    <script>
        var elt = document.getElementById('calculator');
        var calculator = Desmos.Calculator3D(elt);

        calculator.setExpressions([
    // 1. 基礎變數
    { id: 't', latex: 't=0', sliderBounds: { min: 0, max: 12, step: 0.1 }, playing: true },
    { id: 's_list', latex: 's=\\left[0,0.002...1\\right]' },
    
    // 2. 黑板：使用「網格列表」法，這在 API 中最穩定，不需要手動點擊 add slider
    { id: 'board_u', latex: 'u=\\left[-1.5,-1.48...1.5\\right]' },
    { id: 'board_v', latex: 'v=\\left[1,1.02...3\\right]' },
    { id: 'board', latex: '(0, u, v)', color: '#16452d' },
    
    // 3. 人偶本體
    { id: 'head', latex: '(x-0.2)^2 + (y+1.2)^2 + (z-2.2)^2 = 0.05', color: '#000000' }, 
    { id: 'spine', latex: '(0.2, -1.2, 1 + 1.2s)', color: '#000000' }, 
    
    // 4. 腳部：倒 V 字型 (修正座標讓頂點在上)
    { id: 'legL', latex: '(0.2, -1.2 - 0.4s, 1 - s)', color: '#000000' }, 
    { id: 'legR', latex: '(0.2, -1.2 + 0.4s, 1 - s)', color: '#000000' }, 
    
    // 5. 手臂與指引棍
    { id: 'armL', latex: '(0.2, -1.2 - 0.5s, 1.8 - 0.2s)', color: '#000000' },
    { id: 'armR', latex: '(0.2, -1.2 + 0.36s, 1.8 + (0.5\\sin(t))\\cdot 0.2s)', color: '#000000' },
    { id: 'stick', latex: '(0.1, -1.2 + 1.2s, 1.8 + 0.5s \\cdot \\sin(t))', color: '#ffcc00' },

    // 6. 文字 (極細字體)
    { id: 'x1', latex: '(0.05, -0.8 + 0.2s, 2.7 - 0.2s) \\cdot \\{t > 1 : 1, \\operatorname{NaN}\\}', color: '#ffffff' },
    { id: 'x2', latex: '(0.05, -0.8 + 0.2s, 2.5 + 0.2s) \\cdot \\{t > 2 : 1, \\operatorname{NaN}\\}', color: '#ffffff' },
    { id: 'p1', latex: '(0.05, -0.45 + 0.1s, 2.6) \\cdot \\{t > 3 : 1, \\operatorname{NaN}\\}', color: '#ffffff' },
    { id: 'p2', latex: '(0.05, -0.4, 2.55 + 0.1s) \\cdot \\{t > 4 : 1, \\operatorname{NaN}\\}', color: '#ffffff' },
    { id: 'y1', latex: '(0.05, -0.15 + 0.1s, 2.6 - 0.2s) \\cdot \\{t > 5 : 1, \\operatorname{NaN}\\}', color: '#ffffff' },
    { id: 'y2', latex: '(0.05, -0.05 - 0.1s, 2.6 - 0.1s) \\cdot \\{t > 6 : 1, \\operatorname{NaN}\\}', color: '#ffffff' },
    { id: 'e1', latex: '(0.05, 0.2 + 0.2s, 2.65) \\cdot \\{t > 7 : 1, \\operatorname{NaN}\\}', color: '#ffffff' },
    { id: 'e2', latex: '(0.05, 0.2 + 0.2s, 2.55) \\cdot \\{t > 8 : 1, \\operatorname{NaN}\\}', color: '#ffffff' },
    { id: 'z1', latex: '(0.05, 0.6 + 0.2s, 2.7) \\cdot \\{t > 9 : 1, \\operatorname{NaN}\\}', color: '#ffffff' },
    { id: 'z2', latex: '(0.05, 0.8 - 0.2s, 2.7 - 0.2s) \\cdot \\{t > 10 : 1, \\operatorname{NaN}\\}', color: '#ffffff' },
    { id: 'z3', latex: '(0.05, 0.6 + 0.2s, 2.5) \\cdot \\{t > 11 : 1, \\operatorname{NaN}\\}', color: '#ffffff' }
]);
        calculator.setViewport([-5, 5, -5, 5, -1, 6]);
    </script>
</body>
</html>
